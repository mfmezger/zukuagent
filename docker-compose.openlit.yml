# yamllint disable rule:document-start
name: zukuagent-observability
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.4.1
    container_name: clickhouse
    environment:
      CLICKHOUSE_PASSWORD: ${OPENLIT_DB_PASSWORD:-OPENLIT}
      CLICKHOUSE_USER: ${OPENLIT_DB_USER:-default}
      CLICKHOUSE_DATABASE: ${OPENLIT_DB_NAME:-openlit}
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: "true"
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 100s
    restart: always
  openlit:
    image: ghcr.io/openlit/openlit:latest
    container_name: openlit
    environment:
      TELEMETRY_ENABLED: "true"
      INIT_DB_HOST: clickhouse
      INIT_DB_PORT: 8123
      INIT_DB_DATABASE: ${OPENLIT_DB_NAME:-openlit}
      INIT_DB_USERNAME: ${OPENLIT_DB_USER:-default}
      INIT_DB_PASSWORD: ${OPENLIT_DB_PASSWORD:-OPENLIT}
      SQLITE_DATABASE_URL: file:/app/client/data/data.db
      PORT: ${PORT:-3000}
      DOCKER_PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - openlit-data:/app/client/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: always
volumes:
  clickhouse-data:
  openlit-data:
