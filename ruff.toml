# Exclude a variety of commonly ignored directories.
exclude = [
 ".bzr",
 ".direnv",
 ".eggs",
 ".git",
 ".git-rewrite",
 ".hg",
 ".ipynb_checkpoints",
 ".mypy_cache",
 ".nox",
 ".pants.d",
 ".pyenv",
 ".pytest_cache",
 ".pytype",
 ".ruff_cache",
 ".svn",
 ".tox",
 ".venv",
 ".vscode",
 "__pypackages__",
 "_build",
 "buck-out",
 "build",
 "dist",
 "node_modules",
 "site-packages",
 "venv",
 "tests",
]

line-length = 170
indent-width = 4
unsafe-fixes = true
target-version = "py313"

[lint]
select = ["ALL"]
ignore = ["S101", "ERA001", "COM812", "ISC001", "D213", "D211", "TD002", "TD003", "FIX002", "D401", "S105", "ANN002", "ANN003", "INP001", "S104", "S108", "FBT001", "FBT002", "PLW0603", "S106", "PLR2004", "B008", "RET505", "D203", "BLE001"]

fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# `cron_service` executes a fixed `crontab` binary path with arg lists and no shell.
"src/zukuagent/core/cron_service.py" = ["S603"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 170
